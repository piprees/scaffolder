services:
  db:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: scaffolded_application
      POSTGRES_USER: scaffolded_application
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scaffolded_application -d scaffolded_application']
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/scaffolded_application
      SPRING_DATASOURCE_USERNAME: scaffolded_application
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
volumes:
  pgdata:
