spring.application.name=scaffolded-application
server.port=8080

# --- Database (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/scaffolded_application
spring.datasource.username=scaffolded_application
spring.datasource.password=${POSTGRES_PASSWORD:localdev}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Security (GitHub OAuth2) ---
spring.security.oauth2.client.registration.github.client-id=${OAUTH_CLIENT_ID:placeholder}
spring.security.oauth2.client.registration.github.client-secret=${OAUTH_CLIENT_SECRET:placeholder}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
